<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONTROL - CHARROS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        .tabular { font-variant-numeric: tabular-nums; }
        .key-btn { background: #18181b; height: 60px; border-radius: 1rem; border: 1px solid #3f3f46; font-size: 1.5rem; }
        .key-btn:active { background: #dc2626; transform: scale(0.95); }
        .hidden { display: none !important; }
        body { touch-action: manipulation; } /* Evita zoom accidental */
    </style>
</head>
<body class="bg-black text-white p-3 select-none italic font-bold text-center overflow-hidden h-screen flex flex-col justify-center">
    
    <div id="lock" class="fixed inset-0 bg-black flex flex-col items-center justify-center z-50 p-4">
        <div class="mb-6 text-center">
            <h1 class="text-red-600 text-3xl font-black uppercase italic tracking-tighter">CHARROS</h1>
            <p class="text-zinc-500 text-[9px] tracking-[0.3em] font-sans">OPERACIONES ESTADIO</p>
        </div>
        <input type="password" id="p-disp" readonly placeholder="••••" class="bg-transparent text-center text-5xl mb-8 outline-none text-red-600 tabular tracking-[0.4em] w-full">
        <div class="grid grid-cols-3 gap-3 w-full max-w-[280px]">
            <button onclick="a('1')" class="key-btn">1</button><button onclick="a('2')" class="key-btn">2</button><button onclick="a('3')" class="key-btn">3</button>
            <button onclick="a('4')" class="key-btn">4</button><button onclick="a('5')" class="key-btn">5</button><button onclick="a('6')" class="key-btn">6</button>
            <button onclick="a('7')" class="key-btn">7</button><button onclick="a('8')" class="key-btn">8</button><button onclick="a('9')" class="key-btn">9</button>
            <button onclick="c()" class="key-btn text-[10px] text-zinc-500 font-sans">CLEAR</button><button onclick="a('0')" class="key-btn">0</button>
            <button onclick="v()" class="key-btn bg-green-900/40 border-green-600 text-xs font-sans">ENT</button>
        </div>
    </div>

    <div id="panel" class="max-w-md mx-auto hidden w-full flex flex-col h-full justify-between py-2">
        
        <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-3 shadow-xl">
            <div id="r-disp" class="text-5xl tabular text-red-600 font-black leading-none mb-1">00:00</div>
            <div id="st-bar" class="py-0.5 rounded-full text-[9px] border border-zinc-800 bg-black uppercase tracking-widest text-zinc-500">
                ESTADO: <span id="st-txt">SYNC</span>
            </div>
        </div>

        <div class="flex flex-col gap-2 mt-2">
            <button onclick="m('CLOCK')" class="w-full bg-red-900/10 py-3 rounded-xl text-lg border border-red-900 active:bg-red-600 transition-colors">HORA REAL</button>
            
            <div class="grid grid-cols-4 gap-2">
                <button onclick="run(0)" class="bg-zinc-900 h-12 rounded-lg border border-zinc-700 text-lg active:bg-red-600">0:00</button>
                <button onclick="run(20)" class="bg-zinc-900 h-12 rounded-lg border border-zinc-700 text-lg active:bg-red-600">0:20</button>
                <button onclick="run(30)" class="bg-zinc-900 h-12 rounded-lg border border-zinc-700 text-lg active:bg-red-600">0:30</button>
                <button onclick="run(120)" class="bg-zinc-900 h-12 rounded-lg border border-zinc-700 text-lg active:bg-red-600">2:00</button>
            </div>
        </div>

        <div class="bg-zinc-900 p-2 rounded-2xl border border-zinc-800 flex gap-2 items-center my-2">
            <input type="number" id="im" placeholder="MIN" class="w-1/3 bg-white text-black p-2 rounded-lg text-center font-bold text-lg">
            <input type="number" id="is" placeholder="SEG" class="w-1/3 bg-white text-black p-2 rounded-lg text-center font-bold text-lg">
            <button onclick="man()" class="w-1/3 bg-zinc-700 h-10 rounded-lg text-[9px] uppercase text-white font-sans">Cargar</button>
        </div>

        <div class="flex flex-col gap-2 mb-2">
            <button onclick="start()" class="w-full bg-green-700 py-6 rounded-3xl text-4xl active:bg-green-600 shadow-lg">START</button>
            <div class="flex gap-2">
                <button onclick="pause()" class="flex-1 bg-red-900 py-5 rounded-2xl text-lg font-sans uppercase">PAUSE</button>
                <button onclick="reset()" class="flex-1 bg-zinc-600 py-5 rounded-2xl text-lg font-sans uppercase">RESET</button>
            </div>
        </div>
        
    </div>

    <script>
        const HASH = "MTkyNQ=="; 
        const _s = supabase.createClient("https://shtwudjhrrciwbvygphz.supabase.co", "sb_publishable_mDbvgneSToYLbcHXUgCXFw_sXk3S-Um");
        let cp = "", ls = 20, t = null;

        function a(n) { if(cp.length<4) {cp += n; document.getElementById('p-disp').value = cp;} }
        function c() { cp = ""; document.getElementById('p-disp').value = ""; }
        function v() { if(btoa(cp) === HASH) { document.getElementById('lock').classList.add('hidden'); document.getElementById('panel').classList.remove('hidden'); init(); } else { alert("DENEGADO"); c(); } }

        function u(d) {
            clearInterval(t);
            const disp = document.getElementById('r-disp'), txt = document.getElementById('st-txt'), bar = document.getElementById('st-bar');
            txt.innerText = d.status;
            if(d.status === 'CLOCK') {
                bar.className = "py-0.5 rounded-full text-[9px] border border-red-500 bg-red-950/20 text-red-500";
                t = setInterval(() => { const n = new Date(); disp.innerText = `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`; }, 1000);
            } else if(d.status === 'RUNNING') {
                bar.className = "py-0.5 rounded-full text-[9px] border border-green-500 bg-green-950/20 text-green-500";
                t = setInterval(() => {
                    const diff = Math.max(0, Math.ceil((new Date(d.end_at) - new Date()) / 1000));
                    disp.innerText = `${String(Math.floor(diff/60)).padStart(2,'0')}:${String(diff%60).padStart(2,'0')}`;
                }, 200);
            } else {
                bar.className = "py-0.5 rounded-full text-[9px] border border-red-500 bg-red-950/20 text-red-500";
                disp.innerText = `${String(Math.floor(d.seconds/60)).padStart(2,'0')}:${String(d.seconds%60).padStart(2,'0')}`;
            }
        }

        async function m(st) { await _s.from('RELOJ').update({status: st}).eq('id', 1); }
        async function run(s) { ls = s; const e = new Date(); e.setSeconds(e.getSeconds() + s); await _s.from('RELOJ').update({status:'RUNNING', seconds:s, end_at:e.toISOString()}).eq('id', 1); }
        async function man() { const s = (parseInt(document.getElementById('im').value)||0)*60 + (parseInt(document.getElementById('is').value)||0); ls = s; await _s.from('RELOJ').update({status:'PAUSED', seconds:s}).eq('id', 1); }
        async function start() { const e = new Date(); e.setSeconds(e.getSeconds() + ls); await _s.from('RELOJ').update({status:'RUNNING', end_at:e.toISOString()}).eq('id', 1); }
        async function pause() {
            const {data} = await _s.from('RELOJ').select('*').eq('id', 1).single();
            if(data?.status === 'RUNNING') {
                const diff = Math.max(0, Math.ceil((new Date(data.end_at) - new Date()) / 1000));
                ls = diff; await _s.from('RELOJ').update({status:'PAUSED', seconds:diff}).eq('id', 1);
            }
        }
        async function reset() { run(ls); }
        async function init() { const {data} = await _s.from('RELOJ').select('*').eq('id', 1).single(); if(data) u(data); }
        _s.channel('ui').on('postgres_changes', {event:'UPDATE', schema:'public', table:'RELOJ'}, p => u(p.new)).subscribe();
    </script>
</body>
</html>
