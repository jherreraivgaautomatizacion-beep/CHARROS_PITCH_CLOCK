<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB REMOTE - CHARROS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>body { touch-action: manipulation; }</style>
</head>
<body class="bg-zinc-950 text-white p-4 font-sans select-none">
    <div class="max-w-md mx-auto">
        <h1 class="text-red-600 font-black text-center text-xl mb-6 italic">CHARROS REMOTE CONTROL</h1>

        <div class="grid grid-cols-2 gap-3 mb-6">
            <button onclick="updateRemoteTime(00)" class="bg-zinc-900 border border-zinc-700 py-6 rounded-2xl text-2xl font-bold active:bg-red-600">0:00</button>
            <button onclick="updateRemoteTime(20)" class="bg-zinc-900 border border-zinc-700 py-6 rounded-2xl text-2xl font-bold active:bg-red-600">0:20</button>
            <button onclick="updateRemoteTime(30)" class="bg-zinc-900 border border-zinc-700 py-6 rounded-2xl text-2xl font-bold active:bg-red-600">0:30</button>
            <button onclick="updateRemoteTime(120)" class="bg-zinc-900 border border-zinc-700 py-6 rounded-2xl text-2xl font-bold active:bg-red-600">2:00</button>
        </div>

        <div class="flex gap-4">
            <button onclick="triggerStart()" class="flex-[2] bg-green-700 py-10 rounded-3xl text-4xl font-black active:scale-95">START</button>
            <button onclick="triggerPause()" class="flex-1 bg-zinc-900 border-2 border-red-600 py-10 rounded-3xl text-xl font-bold text-red-600">PAUSE</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://shtwudjhrrciwbvygphz.supabase.co";
        const SUPABASE_KEY = "sb_publishable_mDbvgneSToYLbcHXUgCXFw_sXk3S-Um";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let localSecondsMemory = 20;

        async function updateRemoteTime(sec) {
            localSecondsMemory = sec;
            // CAMBIO CLAVE: RELOJ en mayúsculas
            const { error } = await _supabase.from('RELOJ').update({ status: 'PAUSED', seconds: sec }).eq('id', 1);
            if(error) console.log("Error:", error);
        }

        async function triggerStart() {
            const end = new Date();
            end.setSeconds(end.getSeconds() + localSecondsMemory);
            await _supabase.from('RELOJ').update({ 
                status: 'RUNNING', 
                end_at: end.toISOString() 
            }).eq('id', 1);
        }

        async function triggerPause() {
            const { data } = await _supabase.from('RELOJ').select('*').eq('id', 1).single();
            if (data && data.status === 'RUNNING') {
                const now = new Date().getTime();
                const end = new Date(data.end_at).getTime();
                const remaining = Math.max(0, Math.ceil((end - now) / 1000));
                localSecondsMemory = remaining;
                await _supabase.from('RELOJ').update({ status: 'PAUSED', seconds: remaining }).eq('id', 1);
            }
        }
    </script>
</body>
</html>
