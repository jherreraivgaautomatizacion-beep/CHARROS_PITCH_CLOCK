<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CONTROL - CHARROS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        .tabular { font-variant-numeric: tabular-nums; }
        /* AJUSTA EL ALTO DE LOS BOTONES DE PIN AQUÍ */
        .key-btn { background: #18181b; height: 50px; border-radius: 1rem; border: 1px solid #3f3f46; font-size: 1.4rem; }
        .hidden { display: none !important; }
        /* ALTURA TOTAL DE LA PANTALLA */
        body { touch-action: manipulation; height: 100dvh; overflow: hidden; background-color: black; margin: 0; padding: 0; }
        
        /* ESTA ES LA ESTRUCTURA PRINCIPAL */
        /* Cambia el gap-1 por gap-2 si quieres más espacio entre filas */
        .grid-layout { 
            display: grid; 
            grid-template-rows: auto auto auto auto 1fr auto; 
            height: 100dvh; 
            gap: 4px; /* Espacio vertical entre secciones */
            padding: 2px; /* Espacio con la orilla de la pantalla */
            width: 50%;
            box-sizing: border-box;
        }
    </style>
</head>
<body class="text-white select-none italic font-bold text-center">
    
    <div id="lock" class="fixed inset-0 bg-black flex flex-col items-center justify-center z-50 p-4">
        <h1 class="text-red-600 text-2xl font-black uppercase italic mb-4">CHARROS</h1>
        <p class="text-white text-[10px] mb-6 font-sans">LIGA MEXICANA DE BEISBOL</p>
        <input type="password" id="p-disp" readonly placeholder="••••" class="bg-transparent text-center text-5xl mb-8 outline-none text-red-600 tabular tracking-[0.4em] w-full">
        <div class="grid grid-cols-3 gap-3 w-full max-w-[280px]">
            <button onclick="a('1')" class="key-btn">1</button><button onclick="a('2')" class="key-btn">2</button><button onclick="a('3')" class="key-btn">3</button>
            <button onclick="a('4')" class="key-btn">4</button><button onclick="a('5')" class="key-btn">5</button><button onclick="a('6')" class="key-btn">6</button>
            <button onclick="a('7')" class="key-btn">7</button><button onclick="a('8')" class="key-btn">8</button><button onclick="a('9')" class="key-btn">9</button>
            <button onclick="c()" class="key-btn text-[10px] text-zinc-500 font-sans uppercase">Borrar</button><button onclick="a('0')" class="key-btn">0</button>
            <button onclick="v()" class="key-btn bg-green-900/40 border-green-600 text-xs font-sans uppercase">Ent</button>
        </div>
    </div>

    <div id="panel" class="hidden grid-layout">
        
        <div class="bg-zinc-900 border border-zinc-700 rounded-xl p-1">
            <div id="r-disp" class="text-4xl tabular text-red-600 font-black leading-none">00:00</div>
            <div id="st-bar" class="text-[8px] uppercase text-zinc-500 mt-1">ESTADO: <span id="st-txt">SYNC</span></div>
        </div>

        <button onclick="m('CLOCK')" class="w-full bg-red-900/20 py-3 rounded-xl text-sm border border-red-700 uppercase">Mostrar Hora Real</button>

        <div class="grid grid-cols-4 gap-1">
            <button onclick="run(0)" class="bg-zinc-900 py-3 rounded-lg border border-zinc-700 text-sm">0:00</button>
            <button onclick="run(20)" class="bg-zinc-900 py-3 rounded-lg border border-zinc-700 text-sm">0:20</button>
            <button onclick="run(30)" class="bg-zinc-900 py-3 rounded-lg border border-zinc-700 text-sm">0:30</button>
            <button onclick="run(120)" class="bg-zinc-900 py-3 rounded-lg border border-zinc-700 text-sm">2:00</button>
        </div>

        <div class="flex gap-1 h-10">
            <input type="number" id="im" placeholder="MIN" class="flex-1 bg-zinc-800 text-white rounded-lg text-center font-bold text-sm border border-zinc-700 outline-none">
            <input type="number" id="is" placeholder="SEG" class="flex-1 bg-zinc-800 text-white rounded-lg text-center font-bold text-sm border border-zinc-700 outline-none">
            <button onclick="man()" class="bg-zinc-600 px-2 rounded-lg text-[9px] uppercase font-sans">Cargar</button>
        </div>

        <div></div>

        <div class="flex flex-col gap-1">
            <button onclick="start()" class="w-full bg-green-700 py-5 rounded-xl text-4xl shadow-lg border-b-4 border-green-900 active:border-0 uppercase">Start</button>
            <div class="flex gap-1 h-12">
                <button onclick="pause()" class="flex-1 bg-red-900 rounded-lg text-sm font-sans uppercase border-b-4 border-red-950 active:border-0">Pause</button>
                <button onclick="reset()" class="flex-1 bg-zinc-700 rounded-lg text-sm font-sans uppercase border-b-4 border-zinc-800 active:border-0">Reset</button>
            </div>
        </div>
        
    </div>

    <script>
        // ... (El script de Supabase se mantiene igual)
        const HASH = "MTkyNQ=="; 
        const _s = supabase.createClient("https://shtwudjhrrciwbvygphz.supabase.co", "sb_publishable_mDbvgneSToYLbcHXUgCXFw_sXk3S-Um");
        let cp = "", ls = 20, t = null;
        function a(n) { if(cp.length<4) {cp += n; document.getElementById('p-disp').value = cp;} }
        function c() { cp = ""; document.getElementById('p-disp').value = ""; }
        function v() { if(btoa(cp) === HASH) { document.getElementById('lock').classList.add('hidden'); document.getElementById('panel').classList.remove('hidden'); init(); } else { alert("DENEGADO"); c(); } }
        function u(d) {
            clearInterval(t);
            const disp = document.getElementById('r-disp'), txt = document.getElementById('st-txt'), bar = document.getElementById('st-bar');
            txt.innerText = d.status;
            if(d.status === 'CLOCK') {
                bar.className = "text-[8px] uppercase tracking-widest text-red-500 mt-1";
                t = setInterval(() => { const n = new Date(); disp.innerText = `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`; }, 1000);
            } else if(d.status === 'RUNNING') {
                bar.className = "text-[8px] uppercase tracking-widest text-green-500 mt-1";
                t = setInterval(() => {
                    const diff = Math.max(0, Math.ceil((new Date(d.end_at) - new Date()) / 1000));
                    disp.innerText = `${String(Math.floor(diff/60)).padStart(2,'0')}:${String(diff%60).padStart(2,'0')}`;
                }, 200);
            } else {
                bar.className = "text-[8px] uppercase tracking-widest text-red-500 mt-1";
                disp.innerText = `${String(Math.floor(d.seconds/60)).padStart(2,'0')}:${String(d.seconds%60).padStart(2,'0')}`;
            }
        }
        async function m(st) { await _s.from('RELOJ').update({status: st}).eq('id', 1); }
        async function run(s) { ls = s; const e = new Date(); e.setSeconds(e.getSeconds() + s); await _s.from('RELOJ').update({status:'RUNNING', seconds:s, end_at:e.toISOString()}).eq('id', 1); }
        async function man() { const s = (parseInt(document.getElementById('im').value)||0)*60 + (parseInt(document.getElementById('is').value)||0); ls = s; await _s.from('RELOJ').update({status:'PAUSED', seconds:s}).eq('id', 1); }
        async function start() { const e = new Date(); e.setSeconds(e.getSeconds() + ls); await _s.from('RELOJ').update({status:'RUNNING', end_at:e.toISOString()}).eq('id', 1); }
        async function pause() {
            const {data} = await _s.from('RELOJ').select('*').eq('id', 1).single();
            if(data?.status === 'RUNNING') {
                const diff = Math.max(0, Math.ceil((new Date(data.end_at) - new Date()) / 1000));
                ls = diff; await _s.from('RELOJ').update({status:'PAUSED', seconds:diff}).eq('id', 1);
            }
        }
        async function reset() { run(ls); }
        async function init() { const {data} = await _s.from('RELOJ').select('*').eq('id', 1).single(); if(data) u(data); }
        _s.channel('ui').on('postgres_changes', {event:'UPDATE', schema:'public', table:'RELOJ'}, p => u(p.new)).subscribe();
    </script>
</body>
</html>
