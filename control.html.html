<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTROL - CHARROS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        .tabular { font-variant-numeric: tabular-nums; }
    </style>
</head>
<body class="bg-black text-white p-4 select-none italic font-bold text-center">
    <div class="max-w-md mx-auto">
        
        <div class="bg-zinc-900 border-2 border-zinc-700 rounded-3xl p-6 mb-4 shadow-2xl">
            <div id="remote-display" class="text-6xl tabular text-red-600 font-black mb-1">00:00</div>
            <div id="status-bar" class="py-1 rounded-full text-[10px] border border-zinc-700 bg-black uppercase tracking-widest">
                ESTADO: <span id="status-text">CONECTANDO...</span>
            </div>
        </div>

        <button onclick="setRealTimeMode()" class="w-full bg-red-900/20 py-4 rounded-2xl text-xl mb-4 border border-red-600 active:bg-red-600 transition-colors">
            MOSTRAR HORA REAL
        </button>

        <div class="grid grid-cols-2 gap-3 mb-4 text-2xl">
            <button onclick="quickStart(0)" class="bg-zinc-900 h-16 rounded-xl border border-zinc-700 active:bg-red-600">0:00</button>
            <button onclick="quickStart(20)" class="bg-zinc-900 h-16 rounded-xl border border-zinc-700 active:bg-red-600">0:20</button>
            <button onclick="quickStart(30)" class="bg-zinc-900 h-16 rounded-xl border border-zinc-700 active:bg-red-600">0:30</button>
            <button onclick="quickStart(120)" class="bg-zinc-900 h-16 rounded-xl border border-zinc-700 active:bg-red-600">2:00</button>
        </div>

        <div class="bg-zinc-900 p-4 rounded-3xl mb-4 border border-zinc-800">
            <div class="flex gap-2 mb-3 text-black font-sans">
                <input type="number" id="min" placeholder="MIN" class="w-full bg-white p-3 rounded-xl text-center text-xl font-bold">
                <input type="number" id="seg" placeholder="SEG" class="w-full bg-white p-3 rounded-xl text-center text-xl font-bold">
            </div>
            <button onclick="manualSet()" class="w-full bg-zinc-700 py-2 rounded-xl text-xs uppercase text-white">Cargar Manual</button>
        </div>

        <div class="flex flex-col gap-3">
            <button onclick="triggerStart()" class="w-full bg-green-700 py-8 rounded-3xl text-4xl active:bg-green-600 shadow-lg shadow-green-900/20">START</button>
            <div class="flex gap-3">
                <button onclick="triggerPause()" class="flex-1 bg-red-800 py-6 rounded-2xl text-xl">PAUSE</button>
                <button onclick="triggerReset()" class="flex-1 bg-zinc-600 py-6 rounded-2xl text-xl">RESET</button>
            </div>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient("https://shtwudjhrrciwbvygphz.supabase.co", "sb_publishable_mDbvgneSToYLbcHXUgCXFw_sXk3S-Um");
        let lastSetSeconds = 20;
        let localInterval = null;

        function updateUI(data) {
            clearInterval(localInterval);
            const bar = document.getElementById('status-bar');
            const text = document.getElementById('status-text');
            const display = document.getElementById('remote-display');
            
            const status = data.status;
            text.innerText = status;

            if (status === 'CLOCK') {
                bar.className = "py-1 rounded-full text-[10px] border border-red-500 bg-red-950/30 text-red-400 uppercase tracking-widest";
                localInterval = setInterval(() => {
                    const now = new Date();
                    display.innerText = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
                }, 1000);
            } else if (status === 'RUNNING') {
                bar.className = "py-1 rounded-full text-[10px] border border-green-500 bg-green-950/30 text-green-400 uppercase tracking-widest";
                localInterval = setInterval(() => {
                    const diff = Math.max(0, Math.ceil((new Date(data.end_at).getTime() - new Date().getTime()) / 1000));
                    const m = Math.floor(diff / 60);
                    const s = diff % 60;
                    display.innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                }, 200);
            } else {
                bar.className = "py-1 rounded-full text-[10px] border border-red-500 bg-red-950/30 text-red-400 uppercase tracking-widest";
                const m = Math.floor(data.seconds / 60);
                const s = data.seconds % 60;
                display.innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            }
        }

        async function setRealTimeMode() { await _supabase.from('RELOJ').update({ status: 'CLOCK' }).eq('id', 1); }
        
        async function quickStart(sec) {
            lastSetSeconds = sec;
            const end = new Date();
            end.setSeconds(end.getSeconds() + sec);
            await _supabase.from('RELOJ').update({ status: 'RUNNING', seconds: sec, end_at: end.toISOString() }).eq('id', 1);
        }

        async function manualSet() {
            const m = parseInt(document.getElementById('min').value) || 0;
            const s = parseInt(document.getElementById('seg').value) || 0;
            lastSetSeconds = (m * 60) + s;
            await _supabase.from('RELOJ').update({ status: 'PAUSED', seconds: lastSetSeconds }).eq('id', 1);
        }

        async function triggerStart() {
            const end = new Date();
            end.setSeconds(end.getSeconds() + lastSetSeconds);
            await _supabase.from('RELOJ').update({ status: 'RUNNING', end_at: end.toISOString() }).eq('id', 1);
        }

        async function triggerPause() {
            const { data } = await _supabase.from('RELOJ').select('*').eq('id', 1).single();
            if (data && data.status === 'RUNNING') {
                const diff = Math.max(0, Math.ceil((new Date(data.end_at).getTime() - new Date().getTime()) / 1000));
                lastSetSeconds = diff;
                await _supabase.from('RELOJ').update({ status: 'PAUSED', seconds: diff }).eq('id', 1);
            }
        }

        async function triggerReset() { quickStart(lastSetSeconds); }

        _supabase.channel('reloj-ui').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'RELOJ' }, p => updateUI(p.new)).subscribe();
        
        // Sincronización inicial
        async function init() {
            const { data } = await _supabase.from('RELOJ').select('*').eq('id', 1).single();
            if (data) updateUI(data);
        }
        init();
    </script>
</body>
</html>
