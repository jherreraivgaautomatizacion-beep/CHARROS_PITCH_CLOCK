<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MLB DISPLAY - CHARROS</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@900&display=swap');
        body { margin: 0; background: #000; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; cursor: none; }
        #display {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 900; color: #FF0000; text-align: center;
            width: 100vw; display: inline-block;
            font-variant-numeric: tabular-nums;
            font-size: 35vw; line-height: 1; letter-spacing: 0.05em;
            transform: scaleY(1.8);
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
        }
        .animate-pulse { animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .3; } }
    </style>
</head>
<body onclick="document.documentElement.requestFullscreen()">
    <div id="display">00:00</div>

    <script>
        const _supabase = supabase.createClient("https://shtwudjhrrciwbvygphz.supabase.co", "sb_publishable_mDbvgneSToYLbcHXUgCXFw_sXk3S-Um");
        let timerInterval = null;
        let clockInterval = null;

        async function sync() {
            const { data } = await _supabase.from('RELOJ').select('*').eq('id', 1).single();
            if (data) updateDisplay(data);
        }

        function updateDisplay(data) {
            clearInterval(timerInterval);
            clearInterval(clockInterval);
            const el = document.getElementById('display');
            el.classList.remove('animate-pulse');

            if (data.status === 'CLOCK') {
                clockInterval = setInterval(() => {
                    const now = new Date();
                    el.textContent = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
                }, 1000);
            } else if (data.status === 'RUNNING') {
                timerInterval = setInterval(() => {
                    const diff = Math.max(0, Math.ceil((new Date(data.end_at).getTime() - new Date().getTime()) / 1000));
                    render(diff);
                    if (diff <= 0) { clearInterval(timerInterval); el.classList.add('animate-pulse'); }
                }, 200);
            } else {
                render(data.seconds);
            }
        }

        function render(totalSeconds) {
            const m = Math.floor(totalSeconds / 60);
            const s = totalSeconds % 60;
            document.getElementById('display').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }

        _supabase.channel('reloj-realtime').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'RELOJ' }, payload => updateDisplay(payload.new)).subscribe();
        sync();
    </script>
</body>
</html>
