<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MLB LED DISPLAY - SYNC</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@900&display=swap');
        body { margin: 0; background: #000; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }
        #display-container { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        #display {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 900; color: #FF0000; text-align: center; white-space: nowrap;
            font-size: 32vw; line-height: 1; letter-spacing: 0.12em;
            transform: scaleY(1.8); display: inline-block;
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.7);
            position: relative; top: -10px;
        }
    </style>
</head>
<body>
    <div id="display-container"><div id="display">00:00</div></div>

    <script>
        const SUPABASE_URL = "https://shtwudjhrrciwbvygphz.supabase.co";
        const SUPABASE_KEY = "sb_publishable_mDbvgneSToYLbcHXUgCXFw_sXk3S-Um";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let timerInterval = null;

        async function syncInitial() {
            const { data } = await supabaseClient.from('reloj').select('*').eq('id', 1).single();
            if (data) updateClock(data);
        }

        function updateClock(data) {
            clearInterval(timerInterval);
            if (data.status === 'RUNNING') {
                timerInterval = setInterval(() => {
                    const now = new Date().getTime();
                    const end = new Date(data.end_at).getTime();
                    const diff = Math.max(0, Math.ceil((end - now) / 1000));
                    render(diff);
                    if (diff <= 0) {
                        clearInterval(timerInterval);
                        document.getElementById('display').classList.add('animate-pulse');
                    }
                }, 200);
            } else {
                document.getElementById('display').classList.remove('animate-pulse');
                render(data.seconds);
            }
        }

        function render(totalSeconds) {
            const m = Math.floor(totalSeconds / 60);
            const s = totalSeconds % 60;
            document.getElementById('display').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }

        supabaseClient.channel('reloj-changes')
        .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'reloj' }, (payload) => {
            updateClock(payload.new);
        }).subscribe();

        syncInitial();
    </script>
</body>
</html>
